<body class="bg-surface text-on-surface min-h-screen flex flex-col">
  <header class="bg-slate-50 dark:bg-slate-950 flex justify-center items-center px-6 py-4 w-full fixed top-0 z-50">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-slate-900 dark:text-slate-100" data-icon="lock">lock</span>
      <span
        class="text-xl font-bold tracking-tighter text-slate-900 dark:text-slate-50 font-manrope tracking-widest uppercase">FINANCIAL
        ATELIER</span>
    </div>
  </header>
  <main class="flex-grow flex items-center justify-center px-6 py-24">
    <div class="w-full max-w-[440px]">
      <div class="mb-12 text-center">
        <h2 class="text-display-lg text-4xl font-extralight tracking-tight mb-4 text-on-background">
          Bem-vindo ao seu <br />
          <span class="font-bold">Atelier Financeiro</span>
        </h2>
      </div>
      <div
        class="bg-surface-container-lowest rounded-[2rem] p-8 md:p-10 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.05)] space-y-8">
        <div class="space-y-6">
          <div class="space-y-2">
            <label
              class="text-label-sm font-semibold tracking-wide uppercase text-on-surface-variant ml-1">Usuário</label>
            <div class="relative group">
              <input
                class="w-full bg-surface-container-low border-none rounded-xl py-4 px-5 focus:ring-2 focus:ring-primary-fixed focus:bg-surface-container-lowest transition-all placeholder:text-outline/50 text-on-surface"
                placeholder="E-mail ou ID" type="text" />
            </div>
          </div>
          <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
              <label class="text-label-sm font-semibold tracking-wide uppercase text-on-surface-variant">Senha</label>
            </div>
            <div class="relative group">
              <input
                class="w-full bg-surface-container-low border-none rounded-xl py-4 px-5 focus:ring-2 focus:ring-primary-fixed focus:bg-surface-container-lowest transition-all placeholder:text-outline/50 text-on-surface"
                placeholder="••••••••" type="password" id="password" />
            </div>
          </div>
        </div>
        <div class="space-y-4">
          <button
            class="btn-gradient w-full py-5 rounded-xl text-on-primary font-headline font-bold text-lg flex items-center justify-center gap-2 transform active:scale-[0.98] transition-all shadow-xl shadow-primary/10"
            onclick="handleLogin()">
            Entrar
            <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // CONFIGURAÇÃO DO FIREBASE - Substitua com seus dados
    const firebaseConfig = {
      apiKey: "AIzaSyBuajNlZsw2kviJ4CCUBsOnSfqqut2edpw",
      authDomain: "gestofinanceiro.firebaseapp.com",
      projectId: "gestofinanceiro",
      storageBucket: "gestofinanceiro.firebasestorage.app",
      messagingSenderId: "640046313186",
      appId: "1:640046313186:web:7e0a02f1559b26f73c38bb"
    };

    console.log('Firebase config loaded:', firebaseConfig);
    console.log('window.firebase:', window.firebase);

    // Inicializa Firebase
    try {
      const fb = window.firebase || firebase;
      fb.initializeApp(firebaseConfig);
      console.log('Firebase initialized successfully');
      console.log('Firebase auth:', fb.auth);
    } catch (error) {
      console.error('Firebase initialization error:', error);
    }

    // Criar auth instance
    const auth = (window.firebase || firebase).auth();

    const emailInput = document.querySelector('input[type="text"]');
    const passwordInput = document.getElementById('password');

    async function handleLogin() {
      console.log('handleLogin called');

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      console.log('Login attempt:', { email, hasPassword: !!password });

      if (!email || !password) {
        alert("Por favor, preencha email e senha.");
        return;
      }

      const button = document.querySelector('.btn-gradient');
      const originalContent = button.innerHTML;
      button.disabled = true;
      button.innerHTML = '<span class="animate-spin">⏳</span> Entrando...';

      try {
        console.log('Attempting signIn...');
        await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        console.log('Login successful:', userCredential);

        // Salvar usuário no sessionStorage
        const user = userCredential.user;
        sessionStorage.setItem('firebaseUser', JSON.stringify({
          uid: user.uid,
          email: user.email,
          displayName: user.displayName
        }));

        button.innerHTML = originalContent;
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Login error:', error);
        console.error('Error code:', error.code);
        button.innerHTML = originalContent;
        button.disabled = false;

        let message = 'Erro ao entrar. Tente novamente.';
        if (error.code === 'auth/user-not-found') message = 'Usuário não encontrado.';
        if (error.code === 'auth/wrong-password') message = 'Senha incorreta.';
        if (error.code === 'auth/invalid-email') message = 'Email inválido.';
        if (error.code === 'auth/too-many-requests') message = 'Muitas tentativas. Tente mais tarde.';
        if (error.code === 'auth/user-disabled') message = 'Usuário desabilitado.';
        if (error.code === 'auth/invalid-credential') message = 'Credenciais inválidas.';

        alert(message + '\n\nCode: ' + error.code);
      }
    }

    passwordInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
